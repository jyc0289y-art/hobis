<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HOBIS">
    
    <title>HOBIS - Radiation Protection System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* HOBIS UI SYSTEM V4.1 (DATA INTEGRITY FOCUSED) */
        :root {
            --hobis-green: #00ff33;
            --hobis-cyan: #00f7ff;
            --hobis-bg: #0a0a0c;
            --hobis-panel: #111418;
            --hobis-border: #2a3b47;
            --hobis-alert: #ff3300;
            --hobis-warn: #ffcc00;
            --hobis-grid: #1f2b33;
            --input-bg: #0f1215;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--hobis-bg);
            color: var(--hobis-green);
            font-family: 'Share Tech Mono', monospace;
            margin: 0; 
            padding: calc(env(safe-area-inset-top) + 10px) env(safe-area-inset-right) 60px env(safe-area-inset-left);
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            font-size: 16px;
        }

        /* HEADER */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            gap: 10px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--hobis-border);
        }
        h1 {
            font-family: 'Orbitron', sans-serif; margin: 0; font-size: 1.4rem;
            color: var(--hobis-cyan); text-shadow: 0 0 10px var(--hobis-cyan);
        }
        .fs-btn {
            background: transparent; border: 1px solid var(--hobis-cyan); color: var(--hobis-cyan);
            padding: 6px 10px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
            border-radius: 4px; transition: 0.3s; white-space: nowrap;
        }

        .container { max-width: 800px; margin: 0 auto; width: 100%; padding: 0 10px; }

        /* PANELS */
        .panel {
            background: var(--hobis-panel); border: 1px solid var(--hobis-border);
            padding: 20px; margin-bottom: 20px; position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5); border-radius: 4px;
        }
        .panel::before { content:""; position:absolute; top:-1px; left:-1px; width:10px; height:10px; border-top:2px solid var(--hobis-cyan); border-left:2px solid var(--hobis-cyan); }
        .panel::after { content:""; position:absolute; bottom:-1px; right:-1px; width:10px; height:10px; border-bottom:2px solid var(--hobis-cyan); border-right:2px solid var(--hobis-cyan); }

        .header {
            color: var(--hobis-cyan); font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem; margin-bottom: 15px; border-bottom: 1px dashed var(--hobis-border);
            display: flex; justify-content: space-between; align-items: center; padding-bottom: 5px;
            flex-wrap: wrap; gap: 5px;
        }

        /* LOG PANEL */
        .log-container {
            max-height: 250px; overflow-y: auto; 
            border: 1px solid #1f2b33; background: rgba(0,0,0,0.2); padding: 5px;
        }
        .log-item {
            border-bottom: 1px solid #2a3b47; padding: 10px; font-size: 0.85rem; color: #a0c0c0;
        }
        .log-item:last-child { border-bottom: none; }
        .log-time { color: #5f7481; font-size: 0.75rem; display: block; margin-bottom: 2px; }
        .log-mode { color: var(--hobis-cyan); font-weight: bold; margin-right: 5px; }
        .log-date-range { color: var(--hobis-warn); font-size: 0.8rem; display:block; margin-top:2px; }
        .log-result { color: var(--hobis-green); font-weight: bold; display: block; margin-top: 4px; }
        .log-details { display: block; color: #8fa3b0; font-size: 0.8rem; margin-top: 2px; }

        /* GRID & LAYOUT */
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 600px) {
            .grid-row { grid-template-columns: 1fr; gap: 10px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header select, .header button { width: 100% !important; margin-top: 5px; }
        }

        /* CONTROLS */
        label { display: block; color: #8fa3b0; margin-bottom: 5px; font-size: 0.85rem; }
        input, select {
            background: var(--input-bg); border: 1px solid #3c4c56; color: var(--hobis-green);
            padding: 12px; width: 100%; border-radius: 4px;
            font-family: 'Share Tech Mono', monospace; font-size: 1rem; outline: none;
            -webkit-appearance: none;
        }
        input:focus, select:focus { border-color: var(--hobis-cyan); box-shadow: 0 0 8px rgba(0, 247, 255, 0.2); }
        .input-group { display: flex; gap: 5px; }
        .input-group input { flex: 7; border-top-right-radius: 0; border-bottom-right-radius: 0; }
        .input-group select { flex: 3; border-top-left-radius: 0; border-bottom-left-radius: 0; border-left: none; min-width: 80px; text-align:center;}

        /* BUTTONS */
        .btn {
            width: 100%; padding: 16px; background: rgba(0, 255, 51, 0.1);
            border: 1px solid var(--hobis-green); color: var(--hobis-green);
            font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: 0.2s; margin-top: 10px; border-radius: 4px; touch-action: manipulation;
        }
        .btn:active { background: rgba(0, 255, 51, 0.3); transform: translateY(1px); }
        .btn-outline {
            padding: 8px 12px; border: 1px solid #3c4c56; border-radius: 4px;
            background: rgba(0,0,0,0.3); color: #8fa3b0; cursor: pointer; font-size: 0.8rem; touch-action: manipulation;
        }

        /* TABS & MODES */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; background: #15191d; border: 1px solid var(--hobis-border); color: #5f7481;
            padding: 14px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-weight: bold;
            border-radius: 4px; text-align: center; touch-action: manipulation;
        }
        .tab-btn.active {
            background: rgba(0, 247, 255, 0.1); color: var(--hobis-cyan); border-color: var(--hobis-cyan);
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.1);
        }
        .mode-switch {
            display: flex; background: rgba(0,0,0,0.4); border-radius: 6px; margin-bottom: 20px; padding: 4px;
        }
        .mode-opt {
            flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #5f7481; 
            font-weight: bold; transition: 0.2s; font-size: 0.9rem; border-radius: 4px; touch-action: manipulation;
        }
        .mode-opt.active {
            background: rgba(0, 255, 51, 0.15); color: var(--hobis-green); box-shadow: 0 0 5px rgba(0, 255, 51, 0.1);
        }

        /* LISTS */
        .list-item {
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--hobis-border); padding: 10px; 
            margin-bottom: 8px; position: relative; border-radius: 0 4px 4px 0;
        }
        .del-btn { 
            position: absolute; right: 0; top: 0; color: var(--hobis-alert); 
            cursor: pointer; font-size: 1.5rem; padding: 10px; line-height: 0.8; z-index: 5;
        }

        /* CHART & INFO */
        .spec-mini { font-size: 0.75rem; color: #5f7481; margin-top: 4px; }
        .tech-note {
            margin-top: 10px; padding: 10px; border-radius: 4px; font-size: 0.85rem; line-height: 1.4; display: none;
        }
        .note-warn { border: 1px solid var(--hobis-alert); background: rgba(255, 51, 0, 0.1); color: #ff9980; }
        .note-info { border: 1px solid var(--hobis-cyan); background: rgba(0, 247, 255, 0.1); color: #ccffff; }
        
        .result-box {
            background: rgba(0, 255, 51, 0.05); border: 1px solid var(--hobis-green);
            padding: 20px; margin-top: 20px; display: none; border-radius: 4px;
        }
        .res-val { font-size: 1.5rem; color: var(--hobis-cyan); font-weight: bold; word-break: break-all; }
        .chart-container {
            margin-top: 20px; padding: 5px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--hobis-grid); border-radius: 4px;
            height: 250px; position: relative;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>HOBIS v4.1</h1>
        <button class="fs-btn" onclick="toggleFullScreen()">&#x26F6; FULL SCREEN</button>
    </div>

    <div class="panel">
        <div class="header">
            <span>DATA LINK</span>
            <select id="dbSelector" style="width:auto; min-width:150px;" onchange="loadDB()">
                <option value="QSA">QSA (MAN-027)</option>
                <option value="ICRP107">ICRP 107 (S&S)</option>
            </select>
        </div>
        <div style="font-size:0.8rem; color:#666;">
            STATUS: <span id="sysStatus" style="color:var(--hobis-green)">INIT...</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="setMainTab('decay')">DECAY</button>
        <button class="tab-btn" onclick="setMainTab('shield')">SHIELD</button>
    </div>

    <div id="mainPanel" class="panel">
        <div class="header" id="panelTitle">DECAY OPS</div>

        <div id="decayModeSwitch" class="mode-switch">
            <div class="mode-opt active" onclick="setSubMode('decay_forward', this)">FORWARD (Calc Act)</div>
            <div class="mode-opt" onclick="setSubMode('decay_reverse', this)">REVERSE (Calc Date)</div>
        </div>
        <div id="shieldModeSwitch" class="mode-switch hidden" style="display:none;">
            <div class="mode-opt active" onclick="setSubMode('shield_forward', this)">FORWARD (Calc Dose/Act)</div>
            <div class="mode-opt" onclick="setSubMode('shield_reverse', this)">REVERSE (Calc Thick)</div>
        </div>

        <div id="inputArea"></div>

        <button class="btn" onclick="calculate()">EXECUTE</button>

        <div id="resultBox" class="result-box">
            <div style="color:#8fa3b0; font-size:0.9rem; margin-bottom:5px;">COMPUTED RESULT</div>
            <div class="res-val" id="resMain">-</div>
            <div style="font-size:0.9rem; color:#8fa3b0; margin-top:5px; border-top:1px solid #2a3b47; padding-top:5px;" id="resSub"></div>
            <div class="chart-container">
                <canvas id="opsChart"></canvas>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="header">
            <span>MISSION LOG</span>
            <div style="display:flex; gap:5px;">
                <button class="btn-outline" onclick="downloadCSV()">CSV EXPORT</button>
                <button class="btn-outline" style="color:var(--hobis-alert); border-color:var(--hobis-alert);" onclick="clearLog()">CLEAR</button>
            </div>
        </div>
        <div id="logContainer" class="log-container">
            <div style="text-align:center; padding:20px; color:#555;">Ready for operation.</div>
        </div>
    </div>
</div>

<script src="hobis_db.js"></script>

<script>
    // --- HOBIS KERNEL V4.1 ---
    let currentMainTab = 'decay';
    let currentSubMode = 'decay_forward'; 
    let currentData = [];
    let myChart = null;
    let nucOptionsHTML = ""; 
    let logHistory = []; 

    const UNIT_ACT = { "Ci":1, "TBq":27.027, "GBq":0.027027, "Bq":2.7027e-11 };
    const UNIT_DOSE = { "mSv/h":1, "uSv/h":0.001, "R/h":10, "mR/h":0.01 };
    
    function isIOS() {
        return [
            'iPad Simulator', 'iPhone Simulator', 'iPod Simulator', 'iPad', 'iPhone', 'iPod'
        ].includes(navigator.platform) || (navigator.userAgent.includes("Mac") && "ontouchend" in document);
    }

    function toggleFullScreen() {
        if (isIOS()) {
            alert("iOS 정책: [공유] 버튼 -> [홈 화면에 추가]를 사용하세요.");
            return;
        }
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => { console.log(err); });
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    window.onload = function() {
        if(typeof GLOBAL_DB === 'undefined') {
            document.getElementById('sysStatus').innerText = "DB ERROR";
            document.getElementById('sysStatus').style.color = "red";
            alert("Error: 'hobis_db.js' missing.");
        } else {
            loadDB();
            renderInputs();
        }
    };

    function loadDB() {
        const type = document.getElementById('dbSelector').value;
        currentData = GLOBAL_DB[type] || [];
        document.getElementById('sysStatus').innerText = `${type} ONLINE (${currentData.length})`;
        nucOptionsHTML = `<option value="MANUAL">[ MANUAL INPUT ]</option>`;
        currentData.forEach(n => { nucOptionsHTML += `<option value="${n.id}">${n.id}</option>`; });
    }

    // --- STRUCTURAL LOGGING & CSV EXPORT ---
    // Log Data Object Schema
    function createLogEntry() {
        return {
            timestamp: "", dbSource: "", mode: "", 
            totalInputVal: "", inputUnit: "",
            targetVal: "", targetUnit: "",
            resultVal: "", resultUnit: "",
            startDate: "", endDate: "", duration: "", 
            distance: "", shieldMat: "", shieldThick: "",
            sourceJSON: ""
        };
    }

    function addToLog(dataObj) {
        // Enrich with common data
        const now = new Date();
        dataObj.timestamp = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
        dataObj.dbSource = document.getElementById('dbSelector').value;
        
        logHistory.push(dataObj); // Save Structured Data

        // UI Display (Human Readable)
        let inputs = "";
        if(dataObj.sourceJSON) {
            try {
                const src = JSON.parse(dataObj.sourceJSON);
                inputs += `Src: ${src.length > 1 ? src.length + ' Sources' : src[0].id}`;
            } catch(e) { inputs += "Src: Data"; }
        }
        if(dataObj.totalInputVal) inputs += ` (Total: ${dataObj.totalInputVal} ${dataObj.inputUnit})`;
        if(dataObj.targetVal) inputs += ` | Target: ${dataObj.targetVal} ${dataObj.targetUnit}`;
        if(dataObj.distance) inputs += ` @ ${dataObj.distance}m`;
        
        let dates = "";
        if(dataObj.startDate && dataObj.endDate) dates = `<div class="log-date-range">📅 ${dataObj.startDate} → ${dataObj.endDate} (${dataObj.duration}d)</div>`;
        else if(dataObj.endDate) dates = `<div class="log-date-range">📅 Target: ${dataObj.endDate} (${dataObj.duration}d)</div>`;

        let resultDisp = `${dataObj.resultVal} ${dataObj.resultUnit}`;
        if(dataObj.shieldMat) resultDisp = `${dataObj.resultVal} ${dataObj.resultUnit} (${dataObj.shieldMat})`;

        const logItem = `
            <div class="log-item">
                <span class="log-time">[${dataObj.timestamp}]</span>
                <div><span class="log-mode">${dataObj.mode}</span></div>
                <div class="log-details">${inputs}</div>
                ${dates}
                <div class="log-result">>> ${resultDisp}</div>
            </div>`;
        
        const container = document.getElementById('logContainer');
        if(container.innerText.includes("Ready")) container.innerHTML = "";
        container.innerHTML = logItem + container.innerHTML;
    }

    function clearLog() {
        logHistory = [];
        document.getElementById('logContainer').innerHTML = '<div style="text-align:center; padding:20px; color:#555;">Log Cleared.</div>';
    }

    function downloadCSV() {
        if(logHistory.length === 0) { alert("No logs to export."); return; }
        
        // CSV Header (Analysis Friendly)
        let csvContent = "\uFEFFTimestamp,DB_Source,Mode,Total_Input_Val,Input_Unit,Target_Val,Target_Unit,Result_Val,Result_Unit,Start_Date,End_Date,Duration_Days,Distance_m,Shield_Mat,Shield_Thick_mm,Source_JSON\n";
        
        logHistory.forEach(r => {
            const esc = (txt) => `"${String(txt || "").replace(/"/g, '""')}"`;
            const row = [
                esc(r.timestamp), esc(r.dbSource), esc(r.mode),
                r.totalInputVal, esc(r.inputUnit),
                r.targetVal, esc(r.targetUnit),
                r.resultVal, esc(r.resultUnit),
                esc(r.startDate), esc(r.endDate), r.duration,
                r.distance, esc(r.shieldMat), r.shieldThick,
                esc(r.sourceJSON)
            ].join(",");
            csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `HOBIS_LOG_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // --- MAIN LOGIC ---
    function setMainTab(tab) {
        currentMainTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('panelTitle').innerText = tab === 'decay' ? "DECAY OPS" : "SHIELD OPS";
        
        const switchId = tab === 'decay' ? 'decayModeSwitch' : 'shieldModeSwitch';
        const otherId = tab === 'decay' ? 'shieldModeSwitch' : 'decayModeSwitch';
        document.getElementById(switchId).style.display = 'flex';
        document.getElementById(otherId).style.display = 'none';
        
        const defaultMode = tab === 'decay' ? 'decay_forward' : 'shield_forward';
        setSubMode(defaultMode, document.querySelector(`#${switchId} .mode-opt`));
    }

    function setSubMode(mode, el) {
        currentSubMode = mode;
        const parent = el.parentElement;
        parent.querySelectorAll('.mode-opt').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        renderInputs();
        document.getElementById('resultBox').style.display = 'none';
    }

    // --- RENDERER ---
    function renderInputs() {
        const area = document.getElementById('inputArea');
        area.innerHTML = "";
        
        if(currentSubMode === 'decay_forward') {
            area.innerHTML = `
                <div style="margin-bottom:15px; border-bottom:1px dashed #3c4c56; padding-bottom:10px;">
                    <div class="header" style="border:none; margin:0;">
                        <span>SOURCES</span> <button class="btn-outline" onclick="addSourceRow()">+ ADD</button>
                    </div>
                    <div id="sourceList"></div>
                </div>
                <div class="grid-row">
                    <div><label>Start</label><input type="date" id="dateStart"></div>
                    <div><label>Eval</label><input type="date" id="dateEnd"></div>
                </div>
                <div class="grid-row">
                    <div><label>Result Unit</label><select id="outUnit">${getUnitOpts('act')}</select></div>
                </div>`;
            addSourceRow(); 
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateStart').value = today;
            document.getElementById('dateEnd').value = today;
        }

        else if(currentSubMode === 'decay_reverse') {
            area.innerHTML = `
                <div class="grid-row">
                    <div><label>Nuclide</label><select id="nucSelect" onchange="updateRowSpec(this)">${nucOptionsHTML}</select><div class="spec-mini" id="specDisplay">-</div></div>
                    <div>
                        <label>Initial (A0)</label>
                        <div class="input-group"><input type="number" id="inA0" placeholder="Val"><select id="unitA0">${getUnitOpts('act')}</select></div>
                    </div>
                </div>
                <div class="grid-row">
                    <div>
                        <label>Target (At)</label>
                        <div class="input-group"><input type="number" id="inTargetAct" placeholder="Target"><input type="text" value="Matches A0" disabled style="background:#1a2329; color:#666; text-align:center; font-size:0.7rem;"></div>
                    </div>
                    <div><label>Start</label><input type="date" id="dateStart"></div>
                </div>`;
            document.getElementById('dateStart').value = new Date().toISOString().split('T')[0];
            updateRowSpec(document.getElementById('nucSelect'));
        }

        else if(currentSubMode === 'shield_forward') {
            area.innerHTML = `
                <div style="margin-bottom:15px; border-bottom:1px dashed #3c4c56; padding-bottom:10px;">
                    <div class="header" style="border:none; margin:0;">
                        <span>SOURCES</span> <button class="btn-outline" onclick="addSourceRow()">+ ADD</button>
                    </div>
                    <div id="sourceList"></div>
                </div>
                <div class="grid-row">
                     <div><label>Distance (m)</label><input type="number" id="inDist" value="1"></div>
                </div>
                <div style="margin:20px 0; border-top:1px dashed #3c4c56; padding-top:15px;">
                    <div class="header" style="border:none; margin:0;">
                        <span>LAYERS</span> <button class="btn-outline" onclick="addLayerRow()">+ ADD</button>
                    </div>
                    <div id="layerList"></div>
                </div>
                <div class="grid-row">
                     <div>
                        <label>Output Type</label>
                        <select id="outType" onchange="updateOutUnit()">
                            <option value="dose">Dose Rate</option>
                            <option value="act">Eff. Activity</option>
                        </select>
                    </div>
                     <div><label>Output Unit</label><select id="outUnit">${getUnitOpts('dose')}</select></div>
                </div>`;
            addSourceRow(); addLayerRow();
        }

        else if(currentSubMode === 'shield_reverse') {
            area.innerHTML = `
                <div class="grid-row">
                    <div><label>Nuclide</label><select id="nucSelect" onchange="updateRowSpec(this)">${nucOptionsHTML}</select><div class="spec-mini" id="specDisplay">-</div></div>
                    <div>
                        <label>Input Activity</label>
                        <div class="input-group"><input type="number" id="inVal" placeholder="Val"><select id="inUnit">${getUnitOpts('act')}</select></div>
                    </div>
                </div>
                <div style="border-top:1px dashed #3c4c56; margin:15px 0 10px 0;"></div>
                <div class="grid-row">
                    <div>
                        <label>Target Mode</label>
                        <select id="targetType" onchange="updateReverseTargetUnit()">
                            <option value="dose">Target Dose Rate</option>
                            <option value="act">Target Activity</option>
                        </select>
                    </div>
                    <div>
                        <label>Target Value</label>
                        <div class="input-group"><input type="number" id="targetVal" placeholder="Target"><select id="targetUnit">${getUnitOpts('dose')}</select></div>
                    </div>
                </div>
                <div class="grid-row">
                    <div><label>Distance (m)</label><input type="number" id="inDist" value="1"></div>
                    <div>
                        <label>Material</label>
                        <select id="targetMat">
                            <option value="Lead">Lead</option><option value="Concrete">Concrete</option>
                            <option value="Steel">Steel</option><option value="Tungsten">Tungsten</option><option value="DU">DU</option>
                        </select>
                    </div>
                </div>`;
            updateRowSpec(document.getElementById('nucSelect'));
        }
    }

    // --- HELPERS ---
    function addSourceRow() {
        const div = document.createElement('div'); div.className = 'list-item source-row';
        div.innerHTML = `
            <div class="del-btn" onclick="this.parentElement.remove()">×</div>
            <div class="grid-row" style="margin-bottom:0; gap:5px;">
                <div style="flex:1.2"><label>Nuclide</label><select class="src-select" onchange="updateRowSpec(this)">${nucOptionsHTML}</select><div class="spec-mini">-</div></div>
                <div style="flex:1"><label>Activity</label><div class="input-group"><input type="number" class="src-val" placeholder="0"><select class="src-unit" style="min-width:60px;">${getUnitOpts('act')}</select></div></div>
            </div>`;
        document.getElementById('sourceList').appendChild(div);
        updateRowSpec(div.querySelector('.src-select'));
    }

    function addLayerRow() {
        const div = document.createElement('div'); div.className = 'list-item shield-layer';
        div.innerHTML = `
            <div class="del-btn" onclick="this.parentElement.remove()">×</div>
            <div class="grid-row" style="margin-bottom:0; gap:5px;">
                <div style="flex:1"><label>Material</label><select class="mat-select"><option value="Lead">Lead</option><option value="Concrete">Concrete</option><option value="Steel">Steel</option><option value="Tungsten">Tungsten</option><option value="DU">DU</option></select></div>
                <div style="flex:1"><label>Thick (mm)</label><input type="number" class="thk-input" placeholder="0"></div>
            </div>`;
        document.getElementById('layerList').appendChild(div);
    }

    function getUnitOpts(type) {
        if(type==='act') return '<option value="Ci">Ci</option><option value="TBq">TBq</option><option value="GBq">GBq</option><option value="Bq">Bq</option>';
        return '<option value="mSv/h">mSv/h</option><option value="uSv/h">uSv/h</option><option value="R/h">R/h</option><option value="mR/h">mR/h</option>';
    }
    
    function updateOutUnit() {
        const type = document.getElementById('outType').value;
        document.getElementById('outUnit').innerHTML = getUnitOpts(type);
    }
    function updateReverseTargetUnit() {
        const type = document.getElementById('targetType').value;
        document.getElementById('targetUnit').innerHTML = getUnitOpts(type);
    }

    function getNucData(id) {
        if(id === "MANUAL") return { id:"MANUAL" };
        return currentData.find(n => n.id === id);
    }

    function updateRowSpec(el) {
        const id = el.value;
        let disp = (el.id === "nucSelect") ? document.getElementById('specDisplay') : el.parentElement.querySelector('.spec-mini');
        if(id==="MANUAL") { disp.innerText = "Custom Input"; return; }
        const nuc = getNucData(id);
        if(nuc && disp) disp.innerText = `HL:${nuc.hl}${nuc.unit} | Γ:${nuc.gamma}`;
    }

    function getHLDays(nuc) {
        let days = nuc.hl;
        if(nuc.unit==='h') days/=24; if(nuc.unit==='m') days/=(24*60); if(nuc.unit==='y') days*=365.25;
        return days;
    }

    // --- CALC CORE ---
    function calculate() {
        let manualDataCache = {}; 
        function getReadyNuc(id) {
            if(id !== "MANUAL") return getNucData(id);
            if(manualDataCache["MANUAL"]) return manualDataCache["MANUAL"];
            const h = prompt("Manual HL (days):"); const g = prompt("Manual Gamma (mSv·m²/h·Ci):"); const l = prompt("Lead HVL (mm):");
            if(!h||!g) return null;
            const data = { id:"MANUAL", hl:parseFloat(h), unit:'d', gamma:parseFloat(g), hvl:{"Lead":parseFloat(l)||0} };
            manualDataCache["MANUAL"] = data;
            return data;
        }

        const entry = createLogEntry();

        // 1. DECAY FWD
        if(currentSubMode === 'decay_forward') {
            entry.mode = "DECAY_FWD";
            const outUnit = document.getElementById('outUnit').value;
            const d1Str = document.getElementById('dateStart').value;
            const d2Str = document.getElementById('dateEnd').value;
            const elapsedDays = (new Date(d2Str) - new Date(d1Str)) / (86400000);
            
            let totalActivityEnd = 0; let sources = []; let logSources = [];
            let totalInputCi = 0;

            document.querySelectorAll('.source-row').forEach(row => {
                const id = row.querySelector('.src-select').value;
                const val = parseFloat(row.querySelector('.src-val').value) || 0;
                const unit = row.querySelector('.src-unit').value;
                const nuc = getReadyNuc(id);
                if(nuc && val > 0) {
                    const A0_Ci = val * UNIT_ACT[unit]; 
                    totalInputCi += A0_Ci;
                    const hl = getHLDays(nuc);
                    totalActivityEnd += A0_Ci * Math.pow(0.5, elapsedDays/hl);
                    sources.push({ nuc:nuc, A0:A0_Ci, hl:hl });
                    logSources.push({ id: nuc.id, val: val, unit: unit });
                }
            });

            // Populate Log
            entry.totalInputVal = (totalInputCi * (1/UNIT_ACT[outUnit])).toExponential(4); // Approx sum in out unit
            entry.inputUnit = outUnit + " (Eq)";
            entry.sourceJSON = JSON.stringify(logSources);
            entry.startDate = d1Str; entry.endDate = d2Str; entry.duration = elapsedDays.toFixed(1);
            entry.resultVal = (totalActivityEnd * (1/UNIT_ACT[outUnit])).toExponential(4);
            entry.resultUnit = outUnit;

            showResult(`${entry.resultVal} ${entry.resultUnit}`, `Elapsed: ${elapsedDays.toFixed(1)} days`);
            addToLog(entry);

            // CHART
            const labels = []; const data = []; let steps = 100;
            let range = elapsedDays > 0 ? elapsedDays*1.2 : 365;
            for(let i=0; i<=steps; i++) {
                let t = i*(range/steps); let sumAtT = 0;
                sources.forEach(src => { sumAtT += src.A0 * Math.pow(0.5, t/src.hl); });
                labels.push(t.toFixed(1)); data.push(sumAtT * (1/UNIT_ACT[outUnit]));
            }
            drawChart(labels, data, `Total Activity`, 'Days', elapsedDays, parseFloat(entry.resultVal));
        }

        // 2. DECAY REV
        else if(currentSubMode === 'decay_reverse') {
            entry.mode = "DECAY_REV";
            const id = document.getElementById('nucSelect').value;
            const A0 = parseFloat(document.getElementById('inA0').value);
            const inUnit = document.getElementById('unitA0').value;
            const At = parseFloat(document.getElementById('inTargetAct').value);
            const d1Str = document.getElementById('dateStart').value;
            const nuc = getReadyNuc(id);
            if(!nuc || !A0 || !At) return;
            
            const hl = getHLDays(nuc);
            const ratio = At/A0;
            if(ratio >= 1) { alert("Target >= Initial"); return; }
            const days = hl * (Math.log(ratio)/Math.log(0.5));
            const dTarget = new Date(new Date(d1Str).getTime() + (days * 86400000));
            const dTargetStr = dTarget.toISOString().split('T')[0];
            
            entry.sourceJSON = JSON.stringify([{id:nuc.id, val:A0, unit:inUnit}]);
            entry.totalInputVal = A0; entry.inputUnit = inUnit;
            entry.targetVal = At; entry.targetUnit = inUnit;
            entry.startDate = d1Str; entry.endDate = dTargetStr; entry.duration = days.toFixed(1);
            entry.resultVal = days.toFixed(1); entry.resultUnit = "Days";

            showResult(entry.resultVal + " " + entry.resultUnit, `Reach: ${dTargetStr}`);
            addToLog(entry);

            const labels=[]; const data=[]; let steps=100;
            for(let i=0; i<=steps; i++) {
                let t = i*(days*1.2/steps); labels.push(t.toFixed(1)); data.push(A0 * Math.pow(0.5, t/hl));
            }
            drawChart(labels, data, 'Decay Curve', 'Days', days, At);
        }

        // 3. SHIELD FWD
        else if(currentSubMode === 'shield_forward') {
            entry.mode = "SHIELD_FWD";
            const dist = parseFloat(document.getElementById('inDist').value)||1;
            const distFactor = 1/(dist*dist);
            const outType = document.getElementById('outType').value;
            const outUnit = document.getElementById('outUnit').value;
            let sources = []; let layers = []; let logSources = []; let logLayers = [];

            document.querySelectorAll('.source-row').forEach(row => {
                const id = row.querySelector('.src-select').value;
                const val = parseFloat(row.querySelector('.src-val').value)||0;
                const unit = row.querySelector('.src-unit').value;
                const nuc = getReadyNuc(id);
                if(nuc && val > 0) {
                    sources.push({ nuc:nuc, A0: val * UNIT_ACT[unit] });
                    logSources.push({ id: nuc.id, val: val, unit: unit });
                }
            });

            document.querySelectorAll('.shield-layer').forEach(l => {
                const m = l.querySelector('.mat-select').value;
                const t = parseFloat(l.querySelector('.thk-input').value)||0;
                layers.push({ mat: m, thk: t });
                logLayers.push(`${m}:${t}mm`);
            });

            let finalVal = 0; let totalInputCi = 0;
            sources.forEach(src => {
                totalInputCi += src.A0;
                let trans = 1.0;
                layers.forEach(l => {
                    let hvl = (src.nuc.hvl && src.nuc.hvl[l.mat]) ? src.nuc.hvl[l.mat] : (l.mat==='Lead'?src.nuc.hvl['Lead']:0);
                    if(hvl > 0 && l.thk > 0) trans *= Math.pow(0.5, l.thk/hvl);
                });
                
                if (outType === 'dose') finalVal += src.nuc.gamma * src.A0 * distFactor * trans;
                else finalVal += src.A0 * trans;
            });

            if(outType === 'dose') finalVal *= (1/UNIT_DOSE[outUnit]);
            else finalVal *= (1/UNIT_ACT[outUnit]);

            entry.sourceJSON = JSON.stringify(logSources);
            entry.distance = dist;
            entry.shieldMat = logLayers.join("+"); // Composite
            entry.resultVal = finalVal.toExponential(4);
            entry.resultUnit = outUnit;
            // Approx input total for log reference (Activity sum)
            entry.totalInputVal = totalInputCi.toExponential(2);
            entry.inputUnit = "Ci (Sum)";

            showResult(`${entry.resultVal} ${outUnit}`, outType==='dose' ? `Dose @ ${dist}m` : `Eff. Activity`);
            addToLog(entry);

            if(layers.length > 0) {
                const primMat = layers[0].mat; const primThk = layers[0].thk;
                const labels=[]; const data=[]; let steps=100; let maxThk = primThk*2 || 50;
                for(let i=0; i<=steps; i++) {
                    let x = i*(maxThk/steps); let sumVal = 0;
                    sources.forEach(src => {
                        let trans = 1.0;
                        let hvl1 = (src.nuc.hvl && src.nuc.hvl[primMat]) ? src.nuc.hvl[primMat] : 0;
                        if(hvl1>0) trans *= Math.pow(0.5, x/hvl1);
                        for(let k=1; k<layers.length; k++) {
                            let l = layers[k];
                            let hvl = (src.nuc.hvl && src.nuc.hvl[l.mat]) ? src.nuc.hvl[l.mat] : 0;
                            if(hvl>0 && l.thk>0) trans *= Math.pow(0.5, l.thk/hvl);
                        }
                        if(outType==='dose') sumVal += src.nuc.gamma * src.A0 * distFactor * trans;
                        else sumVal += src.A0 * trans;
                    });
                    if(outType==='dose') sumVal *= (1/UNIT_DOSE[outUnit]); else sumVal *= (1/UNIT_ACT[outUnit]);
                    data.push(sumVal); labels.push(x.toFixed(1));
                }
                drawChart(labels, data, `${outType.toUpperCase()} vs ${primMat}`, 'mm', primThk, parseFloat(entry.resultVal));
            }
        }

        // 4. SHIELD REV
        else if(currentSubMode === 'shield_reverse') {
            entry.mode = "SHIELD_REV";
            const id = document.getElementById('nucSelect').value;
            const inVal = parseFloat(document.getElementById('inVal').value);
            const inUnit = document.getElementById('inUnit').value;
            const targetType = document.getElementById('targetType').value;
            const targetVal = parseFloat(document.getElementById('targetVal').value);
            const targetUnit = document.getElementById('targetUnit').value;
            const dist = parseFloat(document.getElementById('inDist').value)||1;
            const mat = document.getElementById('targetMat').value;
            const nuc = getReadyNuc(id);
            if(!nuc || !inVal || !targetVal) return;

            let reqTrans = 1.0; let startBaseForGraph = 0;
            if (targetType === 'dose') {
                let ci = inVal * UNIT_ACT[inUnit]; 
                let doseAtDist = nuc.gamma * ci * (1/(dist*dist));
                reqTrans = (targetVal * UNIT_DOSE[targetUnit]) / doseAtDist;
                startBaseForGraph = doseAtDist * (1/UNIT_DOSE[targetUnit]);
            } else {
                let startAct = inVal * UNIT_ACT[inUnit];
                reqTrans = (targetVal * UNIT_ACT[targetUnit]) / startAct;
                startBaseForGraph = startAct * (1/UNIT_ACT[targetUnit]);
            }

            if(reqTrans >= 1) { showResult("0 mm", "No Shield Needed"); return; }
            
            let hvl = (nuc.hvl && nuc.hvl[mat]) ? nuc.hvl[mat] : 0;
            if(!hvl && mat==='Lead') hvl = nuc.hvl['Lead'];
            if(!hvl) { alert("No HVL data"); return; }
            
            const thk = hvl * (Math.log(reqTrans)/Math.log(0.5));
            
            entry.sourceJSON = JSON.stringify([{id:nuc.id}]);
            entry.totalInputVal = inVal; entry.inputUnit = inUnit;
            entry.targetVal = targetVal; entry.targetUnit = targetUnit;
            entry.distance = dist;
            entry.shieldMat = mat;
            entry.resultVal = thk.toFixed(2);
            entry.resultUnit = "mm";

            showResult(entry.resultVal + " mm", `${mat} (HVL: ${hvl}mm)`);
            addToLog(entry);

            const labels=[]; const data=[]; let steps=100; let maxThk = thk*1.5;
            for(let i=0; i<=steps; i++) {
                let x = i*(maxThk/steps);
                let val = startBaseForGraph * Math.pow(0.5, x/hvl);
                data.push(val); labels.push(x.toFixed(1));
            }
            drawChart(labels, data, `Attenuation vs ${mat}`, 'mm', thk, targetVal);
        }
    }

    function showResult(main, sub) {
        document.getElementById('resMain').innerText = main;
        document.getElementById('resSub').innerText = sub;
        document.getElementById('resultBox').style.display = 'block';
    }

    function drawChart(labels, data, labelStr, xTitle, markX, markY) {
        if(myChart) myChart.destroy();
        const ctx = document.getElementById('opsChart').getContext('2d');
        Chart.defaults.color = '#5f7481';
        
        let closestIdx = 0; let minDiff = 999999;
        labels.forEach((l, i) => { let diff = Math.abs(parseFloat(l) - markX); if(diff < minDiff) { minDiff = diff; closestIdx = i; } });
        const pointData = new Array(data.length).fill(null); pointData[closestIdx] = markY;

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: labelStr, data: data, borderColor: '#00ff33', backgroundColor: 'rgba(0, 255, 51, 0.1)', borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true },
                    { label: 'Result', data: pointData, borderColor: '#ff9900', backgroundColor: '#ff9900', pointRadius: 6, type: 'scatter' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { display:true, labels:{color:'#00f7ff'} } },
                scales: {
                    x: { title:{display:true, text:xTitle, color:'#00f7ff'}, grid:{color:'#1f2b33'} },
                    y: { grid:{color:'#1f2b33'} }
                }
            }
        });
    }
</script>
